<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Ultra</title>
        <link rel="stylesheet" href="style.css" />
        <script defer src="js.js"></script>
    </head>

    <body>
        <header class="site-header">
            <div class="header-row">
                <a class="header-logo" href="index.html">
                    <img src="images/vertx-logo.png" alt="Logo" />
                </a>

                <nav
                    class="header-nav"
                    id="mainNav"
                    aria-label="Main navigation"
                >
                    <a class="header-link" href="#">მთავარი</a>
                    <a class="header-link" href="#">პროდუქცია</a>
                    <a class="header-link" href="categories.html"
                        >კატეგორიები</a
                    >
                    <a class="header-link" href="#">კონტაქტი</a>
                </nav>

                <div class="header-actions">
                    <form class="header-search" role="search">
                        <span class="search-icon" aria-hidden="true">
                            <svg
                                width="16"
                                height="16"
                                viewBox="0 0 24 24"
                                fill="none"
                                xmlns="http://www.w3.org/2000/svg"
                            >
                                <circle
                                    cx="11"
                                    cy="11"
                                    r="7"
                                    stroke="currentColor"
                                    stroke-width="2"
                                />
                                <line
                                    x1="16.65"
                                    y1="16.65"
                                    x2="21"
                                    y2="21"
                                    stroke="currentColor"
                                    stroke-width="2"
                                    stroke-linecap="round"
                                />
                            </svg>
                        </span>
                        <input
                            class="search-input"
                            type="search"
                            placeholder="ძიება..."
                        />
                    </form>

                    <div
                        class="header-lang"
                        role="group"
                        aria-label="Language switch"
                    >
                        <button class="lang-btn is-active" type="button">
                            KA
                        </button>
                        <button class="lang-btn" type="button">EN</button>
                    </div>

                    <button
                        class="burger"
                        type="button"
                        aria-label="Open menu"
                        aria-expanded="false"
                    >
                        <span></span><span></span><span></span>
                    </button>
                </div>
            </div>
        </header>
    </body>
</html>
